name: 'Benchmark'

on:
  push:
    branches:
      - 'main'
      - 'benchmark'  # TODO: Remove it after implement all jobs for benchmark
  workflow_dispatch:

env:
  UV_NO_SYNC: 1
  TASK_X_REMOTE_TASKFILES: 1
  GH_TOKEN: ${{ github.token }}

jobs:
  rst2latex:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: aquaproj/aqua-installer@ea518c135a02fc11ff8024364510c181a5c6b342 # v4.0.3
        with:
          aqua_version: v2.43.1
      - name: 'Set up workspace'
        run: |
          task --yes setup-dev
      - name: Install LaTeX dependencies
        run: |
          TEX_START=$(date +%s%3N)
          sudo apt-get update
          sudo apt-get install -y \
            texlive-latex-recommended \
            texlive-fonts-recommended \
            texlive-latex-extra \
            latexmk
          TEX_END=$(date +%s%3N)
          echo "elapsed_ms=$((TEX_END - TEX_START))" > timing-tex-install.txt
      - name: 'Build demo PDF by rst2latex and pdflatex'
        run: |
          START=$(date +%s%3N)
          uv run rst2latex demo/index.rst demo-by-rst2latex.tex
          pdflatex demo-by-rst2latex.tex demo-by-rst2latex.pdf
          END=$(date +%s%3N)
          echo "elapsed_ms=$((END - START))" > timing-rst2latex.txt
      - uses: actions/upload-artifact@v5
        with:
          name: rst2latex
          path: |
            demo-by-rst2latex.pdf
            timing-rst2latex.txt
            timing-tex-install.txt
  rst2typst:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: aquaproj/aqua-installer@ea518c135a02fc11ff8024364510c181a5c6b342 # v4.0.3
        with:
          aqua_version: v2.43.1
          aqua_opts: '' # Install typst in this phase.
      - name: 'Set up workspace'
        run: |
          task --yes setup-dev
      - name: 'Build demo PDF by rst2typst'
        run: |
          START=$(date +%s%3N)
          uv run rst2typstpdf \
            --page-break-level=1 \
            --template=demo/template.txt \
            demo/index.rst demo-by-rst2typst.pdf
          END=$(date +%s%3N)
          echo "elapsed_ms=$((END - START))" > timing-rst2typst.txt
      - uses: actions/upload-artifact@v5
        with:
          name: rst2typst
          path: |
            demo-by-rst2typst.pdf
            timing-rst2typst.txt
  report:
    runs-on: ubuntu-latest
    needs:
      - rst2latex
      - rst2typst
    steps:
      - name: 'Download rst2latex artifacts'
        uses: actions/download-artifact@v5
        with:
          name: rst2latex
          path: artifacts/
      - name: 'Download rst2typst artifacts'
        uses: actions/download-artifact@v5
        with:
          name: rst2typst
          path: artifacts/
      - name: 'Generate timing comparison report'
        run: |
          LATEX_MS=$(grep elapsed_ms artifacts/timing-rst2latex.txt | cut -d= -f2)
          TYPST_MS=$(grep elapsed_ms artifacts/timing-rst2typst.txt | cut -d= -f2)
          TEX_INSTALL_MS=$(grep elapsed_ms artifacts/timing-tex-install.txt | cut -d= -f2)
          LATEX_TOTAL_MS=$((LATEX_MS + TEX_INSTALL_MS))

          LATEX_S=$(echo "scale=3; $LATEX_MS / 1000" | bc)
          TYPST_S=$(echo "scale=3; $TYPST_MS / 1000" | bc)
          TEX_INSTALL_S=$(echo "scale=3; $TEX_INSTALL_MS / 1000" | bc)
          LATEX_TOTAL_S=$(echo "scale=3; $LATEX_TOTAL_MS / 1000" | bc)

          faster_label() {
            if [ "$1" -lt "$2" ]; then echo "rst2latex"
            elif [ "$2" -lt "$1" ]; then echo "rst2typst"
            else echo "(tie)"; fi
          }
          diff_ms() {
            if [ "$1" -lt "$2" ]; then echo $((2 - 1))
            else echo $((1 - 2)); fi
          }

          FASTER_BUILD=$(faster_label "$LATEX_MS" "$TYPST_MS")
          DIFF_BUILD_MS=$(( LATEX_MS > TYPST_MS ? LATEX_MS - TYPST_MS : TYPST_MS - LATEX_MS ))
          DIFF_BUILD_S=$(echo "scale=3; $DIFF_BUILD_MS / 1000" | bc)
          SLOWER_BUILD_MS=$(( LATEX_MS > TYPST_MS ? LATEX_MS : TYPST_MS ))
          FASTER_BUILD_MS=$(( LATEX_MS < TYPST_MS ? LATEX_MS : TYPST_MS ))
          SPEEDUP_BUILD=$(echo "scale=2; $SLOWER_BUILD_MS / $FASTER_BUILD_MS" | bc)

          FASTER_TOTAL=$(faster_label "$LATEX_TOTAL_MS" "$TYPST_MS")
          DIFF_TOTAL_MS=$(( LATEX_TOTAL_MS > TYPST_MS ? LATEX_TOTAL_MS - TYPST_MS : TYPST_MS - LATEX_TOTAL_MS ))
          DIFF_TOTAL_S=$(echo "scale=3; $DIFF_TOTAL_MS / 1000" | bc)
          SLOWER_TOTAL_MS=$(( LATEX_TOTAL_MS > TYPST_MS ? LATEX_TOTAL_MS : TYPST_MS ))
          FASTER_TOTAL_MS=$(( LATEX_TOTAL_MS < TYPST_MS ? LATEX_TOTAL_MS : TYPST_MS ))
          SPEEDUP_TOTAL=$(echo "scale=2; $SLOWER_TOTAL_MS / $FASTER_TOTAL_MS" | bc)

          cat <<EOF > report.rst
          Benchmark Report: rst2latex vs rst2typst
          =========================================

          Build time only
          ---------------

          .. list-table::
             :header-rows: 1

             * - Tool
               - Elapsed time (ms)
               - Elapsed time (s)
             * - rst2latex
               - ${LATEX_MS}
               - ${LATEX_S}
             * - rst2typst
               - ${TYPST_MS}
               - ${TYPST_S}

          **Faster:** ${FASTER_BUILD} (by ${DIFF_BUILD_MS} ms / ${DIFF_BUILD_S} s, ${SPEEDUP_BUILD}x faster)
          --------------------------

          TeX install time: ${TEX_INSTALL_MS} ms (${TEX_INSTALL_S} s)

          .. list-table::
             :header-rows: 1

             * - Tool
               - Build (ms)
               - Install (ms)
               - Total (ms)
               - Total (s)
             * - rst2latex
               - ${LATEX_MS}
               - ${TEX_INSTALL_MS}
               - ${LATEX_TOTAL_MS}
               - ${LATEX_TOTAL_S}
             * - rst2typst
               - ${TYPST_MS}
               - 0
               - ${TYPST_MS}
               - ${TYPST_S}

          **Faster:** ${FASTER_TOTAL} (by ${DIFF_TOTAL_MS} ms / ${DIFF_TOTAL_S} s, ${SPEEDUP_TOTAL}x faster)
          EOF

          cat <<EOF >> "$GITHUB_STEP_SUMMARY"
          ## Benchmark Report: rst2latex vs rst2typst

          ### Build time only

          | Tool | Elapsed time (ms) | Elapsed time (s) |
          |------|------------------:|-----------------:|
          | rst2latex | ${LATEX_MS} | ${LATEX_S} |
          | rst2typst | ${TYPST_MS} | ${TYPST_S} |

          **Faster:** ${FASTER_BUILD} (by ${DIFF_BUILD_MS} ms / ${DIFF_BUILD_S} s, **${SPEEDUP_BUILD}x faster**)

          ### Including TeX installation

          > TeX install time: ${TEX_INSTALL_MS} ms (${TEX_INSTALL_S} s)

          | Tool | Build (ms) | Install (ms) | Total (ms) | Total (s) |
          |------|-----------:|-------------:|-----------:|----------:|
          | rst2latex | ${LATEX_MS} | ${TEX_INSTALL_MS} | ${LATEX_TOTAL_MS} | ${LATEX_TOTAL_S} |
          | rst2typst | ${TYPST_MS} | 0 | ${TYPST_MS} | ${TYPST_S} |

          **Faster:** ${FASTER_TOTAL} (by ${DIFF_TOTAL_MS} ms / ${DIFF_TOTAL_S} s, **${SPEEDUP_TOTAL}x faster**)
          EOF
      - uses: actions/upload-artifact@v5
        with:
          name: benchmark
          path: |
            artifacts/demo-by-rst2latex.pdf
            artifacts/demo-by-rst2typst.pdf
            report.rst
